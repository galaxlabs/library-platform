# Nginx configuration for library.digigalaxy.cloud
# Reverse proxy for Next.js frontend and Django backend

upstream library_frontend {
    server localhost:3000;
}

upstream library_backend {
    server localhost:8001;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name library.digigalaxy.cloud;
    return 301 https://$server_name$request_uri;
}

# HTTPS server block
server {
    listen 443 ssl http2;
    server_name library.digigalaxy.cloud;

    # SSL certificates (use certbot if available)
    ssl_certificate /etc/letsencrypt/live/library.digigalaxy.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/library.digigalaxy.cloud/privkey.pem;

    # SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml;

    # Client upload size limit (100MB for PDFs)
    client_max_body_size 100M;

    # Logging
    access_log /var/log/nginx/library_access.log combined;
    error_log /var/log/nginx/library_error.log warn;

    # API Routes - proxy to Django backend
    location ~ ^/api/ {
        proxy_pass http://library_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
    }

    # Django admin (optional, for admin access)
    location ~ ^/admin/ {
        proxy_pass http://library_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Media files (uploaded books, assets)
    location /media/ {
        alias /home/library-user/library-platform/backend/media/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Static files (CSS, JS compiled)
    location /_next/static/ {
        proxy_pass http://library_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Frontend routes - proxy to Next.js
    location / {
        proxy_pass http://library_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}